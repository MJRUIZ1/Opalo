<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colaboraciones · Ópalo</title>
  <link href="libs/bootstrap.min.css" rel="stylesheet"/>
  <link href="libs/sweetalert2.min.css" rel="stylesheet"/>  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="libs/fonts/chewy/400.css"/>
  <link rel="stylesheet" href="libs/fonts/raleway/300.css"/>
  <link rel="stylesheet" href="libs/fonts/raleway/300-italic.css"/>
  <link rel="stylesheet" href="libs/fonts/raleway/400.css"/>
  <link rel="stylesheet" href="libs/fonts/raleway/400-italic.css"/>
  <link rel="stylesheet" href="libs/fonts/raleway/600.css"/>
  <link rel="stylesheet" href="libs/fonts/cinzel-decorative/400.css"/>
  <link rel="stylesheet" href="libs/fonts/cinzel-decorative/700.css"/>
  <link rel="stylesheet" href="libs/fonts/cinzel-decorative/900.css"/>
</head>
<body data-page="colaboraciones">

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <canvas id="starfield"></canvas>

  <div class="page-banner">
    <div class="page-banner-bg"></div>
    <div class="page-banner-content reveal">
      <div class="section-label">Colaboraciones</div>
      <div class="accent-line"></div>
      <p class="page-banner-sub">Alianzas que hacen posible las historias</p>
    </div>
  </div>

  <!-- Marquee -->
  <div style="padding:3rem 0 0;">
    <div class="colab-track">
      <div class="colab-inner" id="colabInner"></div>
    </div>
  </div>

  <!-- Cards de colaboraciones -->
  <section style="padding-top:3rem; padding-bottom:4rem;">
    <div class="section-inner">
      <div class="colab-cards-grid" id="colabGrid"></div>
    </div>
  </section>

  <!-- CTA -->
  <section style="padding:5rem 0; background:linear-gradient(180deg,transparent,rgba(59,31,94,0.2));">
    <div class="section-inner" style="text-align:center;">
      <div class="reveal">
        <div class="slogan-stars" style="justify-content:center;display:flex;gap:8px;margin-bottom:1.5rem;">
          <div class="slogan-star"></div>
          <div class="slogan-star"></div>
          <div class="slogan-star"></div>
        </div>
        <h2 style="font-family:'Cinzel Decorative',serif;font-size:clamp(1.5rem,4vw,2.5rem);color:var(--star-white);margin-bottom:1rem;">¿Quieres colaborar con nosotros?</h2>
        <p style="color:rgba(240,232,255,0.65);font-size:1rem;line-height:1.8;max-width:600px;margin:0 auto 2rem;">Estamos siempre abiertos a nuevas alianzas con instituciones, marcas, organizaciones y creadores que compartan nuestra visión.</p>
        <button class="lang-btn" style="padding:12px 36px;font-size:0.9rem;letter-spacing:2px;" onclick="showContacto()">Escríbenos →</button>
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-logo">Ópalo</div>
    <p>Chiapas, México · 2026</p>
    <p style="margin-top:0.5rem;">Cada historia brilla con su propio color</p>
  </footer>

  <script src="libs/bootstrap.bundle.min.js"></script>
  <script src="libs/sweetalert2.all.min.js"></script>
  <script src="nav.js"></script>
  <script src="main.js"></script>
  <script>
    /* Datos de colaboraciones — agregar aquí nuevas entradas */
    const colabs = [
      {
        icono:    '',
        titulo:   'PODCAST',
        desc:     'Ópalo participa en el podcast "Lo que no se ve", donde la integrante María José tuvo la oportunidad de platicar sobre el sistema interactivo "El viaje del Café".',
        tag:      'Académica'
      },
      {
        icono:    '',
        titulo:   'EVENTOS ASISTIDOS',
        desc:     'Ópalo es parte de la Expoferia Febrero 2026 donde los visitantes tuvieron la oportunidad de jugar "El viaje del Café" y tomarse una foto con Coaffe.',
        tag:      'Académica'
      },
      {
        icono:    '',
        titulo:   'OTROS PROYECTOS',
        desc:     'Flores de mi raíz por Bigu · Campaña publicitaria por Tlakuache · Voces que no se escuchan por Kanart Studio.',
        tag:      'Académica'
      },
    ];

    /* Marquee */
    const inner = document.getElementById('colabInner');
    [...colabs, ...colabs, ...colabs].forEach(c => {
      const el = document.createElement('span');
      el.className = 'colab-item';
      el.textContent = c.titulo;
      inner.appendChild(el);
    });

    /* Cards */
    const grid = document.getElementById('colabGrid');
    colabs.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = 'colab-card reveal';
      card.style.transitionDelay = (i * 0.1) + 's';
      card.innerHTML = `
        <div class="colab-card-logo">${c.icono}</div>
        <h4>${c.titulo}</h4>
        <p>${c.desc}</p>
        <span class="proyecto-tag">${c.tag}</span>`;
      grid.appendChild(card);
    });

    initReveal();

    function showContacto() {
      Swal.fire({
        title: `<span style="font-family:'Cinzel Decorative',serif;color:#f6a6e8">Contáctanos</span>`,
        html: `<div style="font-family:'Raleway',sans-serif;color:rgba(240,232,255,0.75);line-height:2">
          <p>📧 <strong style="color:#f6a6e8">opalo@gmail.com</strong></p>
          <p>📍 Tuxtla Gutiérrez, Chiapas, México</p>
          <p>📱 @estudios_opalo</p>
        </div>`,
        confirmButtonText: 'Cerrar',
        background: '#1a0e2e', color: '#f0e8ff', confirmButtonColor: '#f6a6e8',
        backdrop: 'rgba(13,6,24,0.85)'
      });
    }
  </script>
</body>
</html>
